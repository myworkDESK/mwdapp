name: WorkDesk CI

on:
  push:
    branches: [main, 'copilot/**']
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint + unit tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: workers/admin

      - name: Lint
        run: npm run lint --if-present
        working-directory: workers/admin

      - name: Unit tests
        run: npm test --if-present
        working-directory: workers/admin

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy admin Worker (push to main only)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Admin Worker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy workdesk-admin worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: workers/admin
          command: deploy

      - name: Deploy audit-verifier cron
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: workers/cron
          command: deploy --config wrangler.audit-verifier.toml

      - name: Deploy action-processor cron
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: workers/cron
          command: deploy --config wrangler.action-processor.toml

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy Cloudflare Pages (push to main only)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy Pages
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy . --project-name=myworkdeskapp --branch=main
