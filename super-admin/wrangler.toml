# WorkDesk — Super Admin section reference config
# ──────────────────────────────────────────────────────────────
# This file lives in super-admin/ for reference.
# The main project is deployed from the REPOSITORY ROOT using
# the wrangler.toml that lives there.
#
# The Super Admin portal (sa-portal.html, sa-dashboard.html) and
# its API (functions/api/sa-auth.js, functions/api/sa-org-admins.js,
# functions/api/sa-config-check.js) are all part of the main project.
# There is NO separate Cloudflare Pages project for super-admin.
#
# See super-admin/DEPLOY.md for full deployment instructions.
# Design system: see DESIGN_SYSTEM.md
# Feature docs:  see FEATURES.md
# Worker deploy guide (incl. SA secrets setup): see workers/DEPLOY.md
# Deploy: https://pages.cloudflare.com
# Docs:   https://developers.cloudflare.com/pages/

name = "myworkdeskapp"
compatibility_date = "2024-01-01"
# Use the latest Workers runtime for best performance on Cloudflare Pages Functions
compatibility_flags = ["nodejs_compat"]

# ── Project Structure ─────────────────────────────────────────
# pages/        — All HTML frontend pages (login, dashboard, etc.)
# assets/       — Static assets: CSS, JS, images
# functions/api/— Cloudflare Pages Functions (API endpoints)
# workers/      — Standalone Cloudflare Workers:
#   api-worker.js          — API gateway worker (standalone deployments)
#   queues/job-consumer.js — Queue consumer (background jobs)
#   cron/payroll.js        — Scheduled payroll trigger
# middleware/   — Shared client-side scripts (auth.js)
# database/     — D1 SQL schema (schema.sql)
# super-admin/  — Super Admin portal pages + SA-specific deploy guide

# ── Static Assets (zero-build static site) ───────────────────
# All HTML, CSS, JS and assets are served as-is from Cloudflare's global CDN.
# NOTE: directory is ".." (parent) because the SA pages (sa-portal.html,
# sa-dashboard.html) and API functions live at the REPOSITORY ROOT, not inside
# the super-admin/ subfolder.
[assets]
directory = ".."
# Serve index.html for requests to "/"; add .html extension automatically
html_handling = "auto-trailing-slash"
# Return index.html for any unmatched route (SPA-style fallback)
not_found_handling = "single-page-application"

# ── Cloudflare Pages (Git integration) — build settings ──────
# Framework preset : None
# Build command    : (leave empty — zero-build static site)
# Build output dir : /
# Root directory   : /  (leave empty, use repository root)
# Frontend pages:   /pages/*.html

# ── Super Admin secrets (required for SA login) ───────────────
# Set in the Cloudflare Pages project (same project — myworkdeskapp):
#
#   wrangler secret put SA_USERNAME     --name myworkdeskapp
#   wrangler secret put SA_SECURITY_KEY --name myworkdeskapp
#   wrangler secret put SA_PASSWORD     --name myworkdeskapp
#
# Full secrets + deployment guide: super-admin/DEPLOY.md
# Full project config with all bindings: ../wrangler.toml
